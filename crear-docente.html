<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Clases para Todos - Crear Docente</title>
    <link rel="stylesheet" href="crear-docente.css">
    <link rel="icon" href="./img/logo.png" type="image/x-icon" /> <!-- Favicon -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
</head>
<body>
    <!-- Navbar Admin -->
    <nav class="navbar">
        <div class="container nav-container">
            <a class="navbar-brand d-flex align-items-center" href="./index.html" aria-label="Ir a inicio"> <!-- Logo, también lleva al inicio -->
        <img src="./img/logo.png" alt="Clases para todos" class="logo"> <!-- Imagen del logo-->
      </a>
            <div class="admin-info">
                <span class="admin-badge">Administrador</span>
                <button class="btn-logout" onclick="cerrarSesion()">
                    <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="2" stroke="currentColor" width="20" height="20">
                        <path stroke-linecap="round" stroke-linejoin="round" d="M15.75 9V5.25A2.25 2.25 0 0 0 13.5 3h-6a2.25 2.25 0 0 0-2.25 2.25v13.5A2.25 2.25 0 0 0 7.5 21h6a2.25 2.25 0 0 0 2.25-2.25V15M12 9l-3 3m0 0 3 3m-3-3h12.75" />
                    </svg>
                    Cerrar Sesión
                </button>
            </div>
        </div>
    </nav>

    <!-- Formulario Crear Docente -->
    <main class="create-panel">
        <div class="container">
            <div class="back-link">
                <a href="admin.html">
                    <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="2" stroke="currentColor" width="20" height="20">
                        <path stroke-linecap="round" stroke-linejoin="round" d="M10.5 19.5 3 12m0 0 7.5-7.5M3 12h18" />
                    </svg>
                    Volver al Panel
                </a>
            </div>

            <div class="form-card">
                <div class="form-header">
                    <div class="header-icon">
                        <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.5" stroke="white" width="40" height="40">
                            <path stroke-linecap="round" stroke-linejoin="round" d="M18 7.5v3m0 0v3m0-3h3m-3 0h-3m-2.25-4.125a3.375 3.375 0 1 1-6.75 0 3.375 3.375 0 0 1 6.75 0ZM3 19.235v-.11a6.375 6.375 0 0 1 12.75 0v.109A12.318 12.318 0 0 1 9.374 21c-2.331 0-4.512-.645-6.374-1.766Z" />
                        </svg>
                    </div>
                    <h1>Crear Usuario Docente</h1>
                    <p>Complete el formulario para registrar un nuevo docente</p>
                </div>

                <form class="docente-form" id="docenteForm">
                    <div class="form-row">
                        <div class="form-group">
                            <label for="nombre">Nombre completo</label>
                            <input type="text" id="nombre" placeholder="Nombre del docente" required>
                        </div>

                        <div class="form-group">
                            <label for="cedula">Cédula / Documento</label>
                            <input type="text" id="cedula" placeholder="Número de documento" required>
                        </div>
                    </div>

                    <div class="form-row">
                        <div class="form-group">
                            <label for="email">Correo electrónico</label>
                            <input type="email" id="email" placeholder="correo@ejemplo.com" required>
                        </div>

                        <div class="form-group">
                            <label for="telefono">Teléfono</label>
                            <input type="tel" id="telefono" placeholder="Número de teléfono" required>
                        </div>
                    </div>

                    <div class="form-row">
                        <div class="form-group">
                            <label for="especialidad">Especialidad / Área</label>
                            <select id="especialidad" required>
                                <option value="">Seleccione una especialidad</option>
                                <option value="matematicas">Matemáticas</option>
                                <option value="ciencias">Ciencias Naturales</option>
                                <option value="lenguaje">Lenguaje y Literatura</option>
                                <option value="ingles">Inglés</option>
                                <option value="historia">Historia y Geografía</option>
                                <option value="tecnologia">Tecnología e Informática</option>
                                <option value="artes">Artes y Música</option>
                                <option value="educacion-fisica">Educación Física</option>
                            </select>
                        </div>

                        <div class="form-group">
                            <label for="userId">ID de usuario</label>
                            <input type="text" id="userId" placeholder="Ej: docente123" required>
                        </div>
                    </div>

                    <div class="form-row">
                        <div class="form-group">
                            <label for="password">Contraseña</label>
                            <input type="password" id="password" placeholder="••••••••" required>
                        </div>

                        <div class="form-group">
                            <label for="confirmPassword">Confirmar contraseña</label>
                            <input type="password" id="confirmPassword" placeholder="••••••••" required>
                        </div>
                    </div>

                    <div class="form-actions">
                        <button type="button" class="btn-cancel" onclick="window.location.href='admin.html'">Cancelar</button>
                        <button type="submit" class="btn-submit">Crear Docente</button>
                    </div>
                </form>
            </div>
        </div>
    </main>

    <!-- Footer -->
    <footer class="footer">
        <div class="container">
            <p class="footer-title">Técnico Laboral Desarrollo de Software</p>
            <p class="footer-sub">
                Proyecto integrador CESDE | 
                <a href="https://www.un.org/sustainabledevelopment/es/education/" target="_blank" rel="noopener noreferrer">ODS 4</a> | 
                Equipo <a href="equipo.html">BAMKB</a>
            </p>
        </div>
    </footer>

    <script>
        function cerrarSesion() {
            if (confirm('¿Estás seguro de que deseas cerrar sesión?')) {
                window.location.href = 'login.html';
            }
        }

        document.getElementById('docenteForm').addEventListener('submit', function(e) {
            e.preventDefault();
            
            const password = document.getElementById('password').value;
            const confirmPassword = document.getElementById('confirmPassword').value;
            
            if (password !== confirmPassword) {
                alert('Las contraseñas no coinciden. Por favor, verifica.');
                return;
            }
            
            alert('¡Docente creado exitosamente!');
            window.location.href = 'admin.html';
        });
    </script>
</body>
</html>
